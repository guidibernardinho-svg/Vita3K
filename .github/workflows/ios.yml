name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Test
        run: |
          # Detecta workspace ou projeto e executa build e testes
          if [ "`ls -A | grep -i \\.xcworkspace$`" ]; then 
            filetype_parameter="workspace" && file_to_build="`ls -A | grep -i \\.xcworkspace$`"; 
          else 
            filetype_parameter="project" && file_to_build="`ls -A | grep -i \\.xcodeproj$`"; 
          fi
          xcodebuild clean test -"$filetype_parameter" "$file_to_build" -scheme "$(ls -R | grep -m1 \.xcodeproj | sed 's/\.xcodeproj//')" -destination 'platform=iOS Simulator,name=iPhone 15'
