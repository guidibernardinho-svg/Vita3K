name: Build iOS IPA
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          brew install cmake ninja

      - name: Build Vita3K
        run: |
          mkdir build-ios
          cd build-ios
          cmake -DCMAKE_TOOLCHAIN_FILE=../cmake/ios.toolchain.cmake -DIOS_PLATFORM=OS64 -G Ninja ..
          ninja
          
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp build-ios/Vita3K.app Payload/
          zip -r Vita3K.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4

  
        with:
          name: Vita3K-iOS
          path: Vita3K.ipa
